name: 'ipl_dbt'
version: '1.0.0'
config-version: 2

profile: 'ipl_dbt'

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  ipl_dbt:
    staging:
      +materialized: view
    dimensions:
      +materialized: table
    facts:
      +materialized: table
    marts:
      +materialized: table

seeds:
  ipl_dbt:
    +schema: seeds
